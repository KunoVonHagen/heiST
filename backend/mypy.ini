[mypy]
python_version = 3.10

# Core strictness
strict = True

# Exclude test files
exclude = tests/

# Per-module options
[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-tenacity]
ignore_missing_imports = True

[mypy-flask]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-ipaddress]
ignore_missing_imports = True

[mypy-dotenv]
ignore_missing_imports = True

[mypy-numpy]
ignore_missing_imports = True

